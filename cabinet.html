<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Личный кабинет — XOVER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f8f6f2;
            color: #1e1e1e;
            line-height: 1.6;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
        }
        h1 { font-size: 2rem; color: #0b1a2e; margin-bottom: 0.2rem; }
        .subhead { color: #c44536; margin-bottom: 1.5rem; }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #c44536;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }

        .profile-card {
            background: #f8f6f2;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem 2rem;
        }
        .profile-item {
            display: flex;
            justify-content: space-between;
            padding: 0.3rem 0;
            border-bottom: 1px solid #e0dcd4;
        }
        .profile-label { font-weight: 600; color: #0b1a2e; }
        .profile-value { color: #1e1e1e; }

        .abonement {
            border: 1px solid #e0dcd4;
            border-radius: 12px;
            margin-bottom: 0.8rem;
            overflow: hidden;
        }
        .abonement-header {
            background: #f8f6f2;
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .abonement-header:hover { background: #f0ede8; }
        .abonement-header .title { font-weight: 600; font-size: 1rem; }
        .abonement-header .badge {
            font-size: 0.8rem;
            background: #c44536;
            color: #fff;
            padding: 0.15rem 0.8rem;
            border-radius: 12px;
            margin-left: 0.5rem;
        }
        .abonement-header .arrow {
            font-size: 1.2rem;
            transition: transform 0.3s;
        }
        .abonement-header .arrow.open { transform: rotate(180deg); }
        .abonement-body {
            padding: 0 1.2rem 1.2rem;
            display: none;
        }
        .abonement-body.open { display: block; }
        .abonement-body table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .abonement-body th {
            text-align: left;
            font-weight: 600;
            color: #0b1a2e;
            padding: 0.4rem 0.2rem;
            border-bottom: 1px solid #e0dcd4;
        }
        .abonement-body td {
            padding: 0.4rem 0.2rem;
            border-bottom: 1px solid #f0ede8;
        }
        .status-taken { color: #c44536; font-weight: 500; }
        .status-returned { color: #28a745; }
        .abonement-stats {
            font-size: 0.85rem;
            color: #4a5a6e;
            margin-top: 0.3rem;
        }
        .empty { color: #999; font-style: italic; }

        .btn-logout {
            background: #c44536;
            color: #fff;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }
        .btn-logout:hover { background: #a83226; }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #4a5a6e;
        }
        .error {
            color: #c44536;
            text-align: center;
            padding: 1rem;
        }

        @media (max-width: 600px) {
            .profile-card { grid-template-columns: 1fr; }
            .abonement-header { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>👤 Личный кабинет</h1>
    <p class="subhead">Ваши данные и история абонементов</p>

    <div id="cabinet">
        <div class="loading">⏳ Загрузка данных...</div>
    </div>

    <a href="/site/" class="back-link">← На главную</a>
</div>

<script>
    // ===== КОНФИГУРАЦИЯ =====
    // ЭТИ ССЫЛКИ ВСТАВЬ СВОИ
    SCRIPT_URL_ABONEMENTS = os.environ.get('SCRIPT_URL_ABONEMENTS', 'https://script.google.com/macros/s/AKfycbxXUN9rzOqcm135MTruAOc1NkbKxiz9e2gBiCZMGn6JYYkB595GQT3vZyPIHrc5pIafcg/exec')
    SCRIPT_URL_BOOKS = os.environ.get('SCRIPT_URL_BOOKS', 'https://script.google.com/macros/s/AKfycbxXUN9rzOqcm135MTruAOc1NkbKxiz9e2gBiCZMGn6JYYkB595GQT3vZyPIHrc5pIafcg/exec')

    // ===== ПАРСИНГ QR =====
    function parseQR(qr) {
        const parts = qr.split('|');
        if (parts.length < 5) return null;
        return {
            abonement_id: parts[0],
            client_id: parts[1],
            name: parts[2],
            abonement_type: parts[3],
            created_at: parts[4]
        };
    }

    // ===== ЗАГРУЗКА АБОНЕМЕНТОВ =====
    async function fetchAbonements(clientId) {
        try {
            const url = `${SCRIPT_URL_ABONEMENTS}?action=get_abonements&client_id=${clientId}`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.success) {
                return data.abonements;
            }
            return [];
        } catch (err) {
            console.error('Ошибка:', err);
            return [];
        }
    }

    // ===== ЗАГРУЗКА ЗАПИСЕЙ =====
    async function fetchAllRecords(clientId) {
        try {
            const url = `${SCRIPT_URL_BOOKS}?action=get_all_records&client_id=${clientId}`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.success) {
                return data.records;
            }
            return [];
        } catch (err) {
            console.error('Ошибка:', err);
            return [];
        }
    }

    // ===== ГРУППИРОВКА =====
    function groupByAbonement(abonements, records) {
        const booksByAbonement = {};
        records.forEach(r => {
            const key = r.abonement_id;
            if (!booksByAbonement[key]) booksByAbonement[key] = [];
            booksByAbonement[key].push({
                title: r.book_title,
                issued_at: r.issued_at,
                returned_at: r.returned_at || null
            });
        });

        const groups = abonements.map(a => ({
            abonement_id: a.abonement_id,
            abonement_type: a.abonement_type,
            created_at: a.created_at,
            books: booksByAbonement[a.abonement_id] || []
        }));

        return groups.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    }

    // ===== ОТРИСОВКА =====
    function renderCabinet(qrData, groups) {
        const typeNames = {
            '1': 'Базовый (10 записей)',
            '2': 'Стандартный (15 записей)',
            '3': 'Премиум (20 записей)'
        };

        const container = document.getElementById('cabinet');

        let profileHtml = `
            <div class="profile-card">
                <div class="profile-item"><span class="profile-label">👤 ФИО</span><span class="profile-value">${qrData.name}</span></div>
                <div class="profile-item"><span class="profile-label">🆔 ID клиента</span><span class="profile-value">${qrData.client_id}</span></div>
                <div class="profile-item"><span class="profile-label">📅 Дата регистрации</span><span class="profile-value">${qrData.created_at}</span></div>
            </div>
        `;

        let abonementsHtml = '';
        if (groups.length === 0) {
            abonementsHtml = `<div class="empty">📭 У вас пока нет абонементов</div>`;
        } else {
            groups.forEach((g, idx) => {
                const total = g.books.length;
                const taken = g.books.filter(b => b.returned_at === null).length;
                const typeLabel = typeNames[g.abonement_type] || g.abonement_type;

                let booksHtml = '';
                if (g.books.length === 0) {
                    booksHtml = `<tr><td colspan="3" class="empty">📭 В этом абонементе пока нет книг</td></tr>`;
                } else {
                    g.books.forEach(b => {
                        const status = b.returned_at === null
                            ? `<span class="status-taken">📖 На руках</span>`
                            : `<span class="status-returned">✅ Возвращена (${b.returned_at})</span>`;
                        booksHtml += `
                            <tr>
                                <td>${b.title}</td>
                                <td>${b.issued_at}</td>
                                <td>${status}</td>
                            </tr>
                        `;
                    });
                }

                const isCurrent = idx === 0 ? '⭐ ' : '';

                abonementsHtml += `
                    <div class="abonement">
                        <div class="abonement-header" onclick="toggleAbonement(this)">
                            <span>
                                <span class="title">${isCurrent}🎫 ${typeLabel}</span>
                                <span class="badge">${taken} на руках / ${total} всего</span>
                            </span>
                            <span class="arrow" id="arrow-${idx}">▼</span>
                        </div>
                        <div class="abonement-body" id="body-${idx}">
                            <div class="abonement-stats">📅 Создан: ${g.created_at}</div>
                            <table>
                                <thead><tr><th>Книга</th><th>Выдана</th><th>Статус</th></tr></thead>
                                <tbody>${booksHtml}</tbody>
                            </table>
                        </div>
                    </div>
                `;
            });
        }

        container.innerHTML = `
            ${profileHtml}
            <h3 style="margin: 1.5rem 0 0.8rem;">📚 История абонементов</h3>
            ${abonementsHtml}
            <button class="btn-logout" onclick="logout()">🚪 Выйти</button>
        `;
    }

    function toggleAbonement(header) {
        const body = header.nextElementSibling;
        const arrow = header.querySelector('.arrow');
        body.classList.toggle('open');
        arrow.classList.toggle('open');
    }

    function logout() {
        localStorage.removeItem('reader_qr');
        window.location.href = '/site/login-client.html';
    }

    (async function() {
        const qr = localStorage.getItem('reader_qr');
        if (!qr) {
            window.location.href = '/site/login-client.html';
            return;
        }

        const qrData = parseQR(qr);
        if (!qrData) {
            document.getElementById('cabinet').innerHTML = `<div class="error">❌ Неверный формат QR-кода</div>`;
            return;
        }

        const [abonements, records] = await Promise.all([
            fetchAbonements(qrData.client_id),
            fetchAllRecords(qrData.client_id)
        ]);

        const groups = groupByAbonement(abonements, records);
        renderCabinet(qrData, groups);
    })();
</script>
</body>
</html>
