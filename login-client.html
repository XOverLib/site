<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход по QR — XOVER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f8f6f2;
            color: #1e1e1e;
            line-height: 1.6;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            text-align: center;
        }
        h1 { font-size: 2rem; color: #0b1a2e; margin-bottom: 0.5rem; }
        .subhead { color: #c44536; font-size: 1rem; margin-bottom: 1.5rem; }
        .btn-primary {
            background: #c44536;
            color: #fff;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .btn-primary:hover { background: #a83226; }
        .btn-secondary {
            background: #e0dcd4;
            color: #1e1e1e;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
            width: 100%;
        }
        .btn-secondary:hover { background: #ccc; }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #c44536;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }
        #status {
            margin-top: 1rem;
            font-size: 0.95rem;
            color: #4a5a6e;
            min-height: 2rem;
        }
        #reader-container {
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1/1;
            display: none;
        }
        .file-label {
            display: inline-block;
            background: #c44536;
            color: #fff;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 0.5rem;
            border: none;
            font-weight: 600;
        }
        .file-label:hover { background: #a83226; }
        .hidden { display: none !important; }
        #fileInput { display: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔑 Вход по QR-коду</h1>
    <p class="subhead">Отсканируйте QR-код из вашего читательского билета</p>

    <button class="btn-primary" id="scanBtn">📷 Сканировать QR</button>
    <label class="file-label" id="fileLabel">📁 Загрузить фото QR-кода</label>
    <input type="file" id="fileInput" accept="image/*" />

    <div id="reader-container"></div>
    <div id="status">Выберите способ входа</div>

    <a href="/" class="back-link">← На главную</a>
</div>

<!-- Подключаем html5-qrcode для камеры и jsQR для фото -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

<script>
    let html5QrCode = null;
    let isScanning = false;

    const readerContainer = document.getElementById('reader-container');
    const status = document.getElementById('status');
    const scanBtn = document.getElementById('scanBtn');
    const fileInput = document.getElementById('fileInput');
    const fileLabel = document.getElementById('fileLabel');

    // ===== ВХОД ПО QR =====
    function loginWithQR(decodedText) {
        localStorage.setItem('reader_qr', decodedText);
        window.location.href = '/cabinet.html';
    }

    // ===== ЗАПУСК СКАНЕРА (камера) =====
    async function startScanner() {
        if (isScanning) return;
        isScanning = true;

        readerContainer.style.display = 'block';
        status.textContent = '⏳ Запуск камеры...';
        scanBtn.disabled = true;
        fileLabel.classList.add('hidden');

        try {
            const Html5Qrcode = window.Html5Qrcode;
            if (!Html5Qrcode) throw new Error('Библиотека не загружена');

            html5QrCode = new Html5Qrcode('reader-container');

            await html5QrCode.start(
                { facingMode: 'environment' },
                { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
                (decodedText) => {
                    stopScanner();
                    loginWithQR(decodedText);
                },
                () => {}
            );

            status.textContent = '✅ Камера работает, наведите на QR-код';
        } catch (err) {
            console.warn('Ошибка камеры:', err);
            status.textContent = '❌ Не удалось открыть камеру. Используйте загрузку фото.';
            readerContainer.style.display = 'none';
            isScanning = false;
            scanBtn.disabled = false;
            fileLabel.classList.remove('hidden');
        }
    }

    // ===== ОСТАНОВКА СКАНЕРА =====
    function stopScanner() {
        if (html5QrCode) {
            try { html5QrCode.stop().catch(() => {}); } catch (e) {}
            html5QrCode = null;
        }
        isScanning = false;
        scanBtn.disabled = false;
        readerContainer.style.display = 'none';
        fileLabel.classList.remove('hidden');
    }

    // ===== РАСПОЗНАВАНИЕ QR ИЗ ФОТО (через jsQR) =====
    function decodeQRFromImage(imageData) {
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        if (code && code.data) {
            return code.data;
        }
        return null;
    }

    function handleFileUpload(file) {
        status.textContent = '⏳ Распознавание QR-кода...';

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                // Создаём canvas для получения пиксельных данных
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                // Пробуем распознать QR
                const decoded = decodeQRFromImage(imageData);
                if (decoded) {
                    status.textContent = '✅ QR-код распознан!';
                    loginWithQR(decoded);
                } else {
                    status.textContent = '❌ Не удалось распознать QR-код на фото. Попробуйте другое фото.';
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // ===== СОБЫТИЯ =====
    scanBtn.addEventListener('click', startScanner);

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            const file = e.target.files[0];
            handleFileUpload(file);
        }
        fileInput.value = '';
    });

    // ===== КЛАВИША ESC ДЛЯ ОСТАНОВКИ =====
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            stopScanner();
            status.textContent = 'Сканирование отменено';
        }
    });

    // ===== ПРОВЕРКА, ЕСТЬ ЛИ УЖЕ QR В localStorage =====
    if (localStorage.getItem('reader_qr')) {
        window.location.href = '/cabinet.html';
    }
</script>
</body>
</html>
