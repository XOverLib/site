name: Example Workflow

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run script using secret URL
        env:
          TARGET_URL: ${{ secrets.SECRET_TABLE }}
        run: |
          # Скрипт использует переменную окружения, не видя сам секрет в коде
          curl -X GET "$TARGET_URL" 
