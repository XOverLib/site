name: Deploy Website with Secret

on:
  push:
    branches:
      - main  # Скрипт будет запускаться при каждом пуше в ветку main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория на сервер GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Безопасно внедряем секретную ссылку в JS-файл перед публикацией.
      # Утилита sed найдет плейсхолдер REPLACE_WITH_MY_SECRET_URL и заменит его на значение из настроек.
      - name: Inject Secret URL
        run: |
          sed -i 's|REPLACE_WITH_MY_SECRET_URL|${{ secrets.SECRET_TABLE }}|g' script.js

      # 3. Публикуем обновленный код на GitHub Pages в ветку main
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .        # Публикуем всю корневую папку сайта
          branch: main  # Ветка, из которой GitHub Pages будет раздавать сайт
