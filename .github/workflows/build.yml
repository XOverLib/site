name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Create config.js from secret
        env:
          WEBAPP_URL: ${{ secrets.SECRET_TABLE }}
        run: |
          echo "const SCRIPT_URL = '$WEBAPP_URL';" > config.js
          echo "✅ config.js created"

      - name: Deploy config.js to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          allow_empty_commit: true
          force_orphan: true
          keep_files: false
