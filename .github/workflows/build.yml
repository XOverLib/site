name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create config.js without token (use placeholder)
        run: |
          echo "// config.js - token will be replaced at runtime" > config.js
          echo "// This file is generated by GitHub Actions" >> config.js
          echo "const GITHUB_REPO = '${{ github.repository }}';" >> config.js
          echo "// Token is not stored in the repository" >> config.js
          cat config.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          allow_empty_commit: true
          force_orphan: true
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
