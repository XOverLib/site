name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create config.js from secret
        run: |
          echo "const SCRIPT_URL = '${{ secrets.SECRET_TABLE }}';" > config.js

      - name: Commit and push config.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.js
          git commit -m "Update config.js from secret" || echo "No changes to commit"
          git push
