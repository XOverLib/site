name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create config.js with token
        run: |
          echo "// Auto-generated config" > config.js
          echo "const GITHUB_TOKEN = '${{ secrets.NEW_TOKEN }}';" >> config.js
          echo "const GITHUB_REPO = '${{ github.repository }}';" >> config.js
          cat config.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          token: ${{ secrets.NEW_TOKEN }}
          clean: true
